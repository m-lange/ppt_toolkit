name: Deploy to GitHub Pages

# Die Action wird ausgeführt, sobald du Code in den "main" Branch pushst
on:
  push:
    branches: ["main"]
  workflow_dispatch: # Erlaubt es dir, die Action auch manuell auf GitHub zu starten

# Berechtigungen, die GitHub braucht, um die Seite zu veröffentlichen
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project (Vite)
        run: npm run build

      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact (dist folder)
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite speichert den fertigen Code im dist-Ordner

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4